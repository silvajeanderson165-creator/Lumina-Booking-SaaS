name: CI

# CI executada em cada push e pull request.
# O deploy (deploy_backend.yml) só roda DEPOIS desta passar.
# Auditoria 2026-05-17, crítico #12: CI anterior era deploy-only sem nenhum check.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Backend — lint, security, tests
  # ─────────────────────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check backend/

  backend-security:
    name: Backend security (bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install tools
        run: pip install bandit pip-audit
      - name: Run bandit (static analysis)
        run: bandit -r backend/ -x backend/test_graphql.py,backend/test_graphql_full.py
      - name: Run pip-audit (CVE check)
        run: pip-audit -r backend/requirements.txt

  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-django
      - name: Run tests
        env:
          DEBUG: '1'
          SECRET_KEY: 'ci-test-key-not-for-production'
          DATABASE_URL: 'sqlite:///test.db'
        run: |
          cd backend
          # TODO (Sessão 7): substituir test_graphql*.py por suíte pytest real (auditoria item 16).
          # Por enquanto roda os scripts ad-hoc se existirem; não falha o CI por ausência.
          if [ -d tests ]; then pytest tests/; else echo "(sem testes pytest ainda)"; fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend — lint, build
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend lint (eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint

  frontend-build:
    name: Frontend build (vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build

  frontend-audit:
    name: Frontend security (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Audit
        working-directory: frontend
        # --omit=dev: ignora vulns de devDeps (vite, eslint, etc.) que não vão pra prod.
        # --audit-level=high: falha apenas em high/critical (deixa low/moderate para Dependabot).
        run: npm audit --omit=dev --audit-level=high

  # ─────────────────────────────────────────────────────────────────────────────
  # Segredos vazados no histórico
  # ─────────────────────────────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # gitleaks precisa do histórico completo
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job de resumo — usado como gate pelo deploy_backend.yml
  # ─────────────────────────────────────────────────────────────────────────────
  ci-success:
    name: CI success
    runs-on: ubuntu-latest
    needs:
      - backend-lint
      - backend-security
      - backend-tests
      - frontend-lint
      - frontend-build
      - frontend-audit
      - secrets-scan
    if: always()
    steps:
      - name: Verifica que todos os checks passaram
        run: |
          if [ "${{ needs.backend-lint.result }}" != "success" ] || \
             [ "${{ needs.backend-security.result }}" != "success" ] || \
             [ "${{ needs.backend-tests.result }}" != "success" ] || \
             [ "${{ needs.frontend-lint.result }}" != "success" ] || \
             [ "${{ needs.frontend-build.result }}" != "success" ] || \
             [ "${{ needs.frontend-audit.result }}" != "success" ] || \
             [ "${{ needs.secrets-scan.result }}" != "success" ]; then
            echo "❌ Algum check de CI falhou — deploy bloqueado."
            exit 1
          fi
          echo "✅ Todos os checks passaram."
